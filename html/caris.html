<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cariler | Stok + Satış Yönetim Paneli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-box-seam"></i>
            <span>Stok+Satış</span>
        </div>

        <nav class="nav flex-column">
            <a href="index.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="products.html" class="nav-link"><i class="bi bi-box"></i> Ürünler</a>
            <a href="warehouses.html" class="nav-link"><i class="bi bi-buildings"></i> Depolar</a>
            <a href="stocks.html" class="nav-link"><i class="bi bi-diagram-3"></i> Stok Yönetimi</a>
            <a href="caris.html" class="nav-link active"><i class="bi bi-people"></i> Cariler</a>
            <a href="sales.html" class="nav-link"><i class="bi bi-cart-check"></i> Satışlar</a>
            <a href="#" class="nav-link"><i class="bi bi-bar-chart-line"></i> Raporlar</a>
            <a href="#" class="nav-link"><i class="bi bi-gear"></i> Ayarlar</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="topbar d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h4 class="mb-1 fw-bold">Cari Yönetimi</h4>
                <small class="text-muted">Carileri görüntüleyin, ekleyin ve yönetin.</small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-primary rounded-pill px-4" id="openAddCariModalBtn">
                    <i class="bi bi-plus-circle me-2"></i>Yeni Cari Ekle
                </button>

                <div class="d-flex align-items-center gap-2">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:42px;height:42px;">
                        A
                    </div>
                    <div>
                        <div class="fw-semibold">Adil</div>
                        <small class="text-muted">Admin</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card content-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h5 class="section-title mb-0">Cari Listesi</h5>

                    <div class="d-flex gap-2">
                        <input type="text" class="form-control" placeholder="Cari ara..." style="max-width: 220px;">
                        <button class="btn btn-outline-primary rounded-pill">Ara</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Tip</th>
                                <th>Ad Soyad / Unvan</th>
                                <th>Telefon</th>
                                <th>Email</th>
                                <th class="text-end">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="carisTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">Cariler yükleniyor...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addCariModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Yeni Cari Ekle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>
                <div class="modal-body">
                    <form id="addCariForm">
                        <div class="mb-3">
                            <label class="form-label">Cari Tipi</label>
                            <select class="form-select" id="cariType" required>
                                <option value="musteri">Müşteri</option>
                                <option value="tedarikci">Tedarikçi</option>
                                <option value="personel">Personel</option>
                                <option value="yonetici">Yönetici</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ad / Unvan</label>
                            <input type="text" class="form-control" id="cariName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefon</label>
                            <input type="text" class="form-control" id="cariPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-Posta</label>
                            <input type="email" class="form-control" id="cariEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Adres</label>
                            <input type="text" class="form-control" id="cariAddress">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Açıklama</label>
                            <textarea class="form-control" id="cariDesc" rows="2"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary rounded-pill">Cariyi Kaydet</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editCariModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Cari Güncelle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>
                <div class="modal-body">
                    <form id="editCariForm">
                        <input type="hidden" id="editCariId">
                        
                        <div class="mb-3">
                            <label class="form-label">Cari Tipi</label>
                            <select class="form-select" id="editCariType" required>
                                <option value="musteri">Müşteri</option>
                                <option value="tedarikci">Tedarikçi</option>
                                <option value="personel">Personel</option>
                                <option value="yonetici">Yönetici</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ad / Unvan</label>
                            <input type="text" class="form-control" id="editCariName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefon</label>
                            <input type="text" class="form-control" id="editCariPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-Posta</label>
                            <input type="email" class="form-control" id="editCariEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Adres</label>
                            <input type="text" class="form-control" id="editCariAddress">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Açıklama</label>
                            <textarea class="form-control" id="editCariDesc" rows="2"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary rounded-pill">Güncelle</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="confirmModalTitle">Onay</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="mb-0 text-muted" id="confirmModalText"></p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4" id="confirmModalOkBtn">Evet, Sil</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/caris.js"></script>
    <script src="/js/common.js"></script>
</body>
</html>
