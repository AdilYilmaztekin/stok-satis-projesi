<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stok Yönetimi | Stok + Satış Yönetim Paneli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <div class="sidebar"></div>

    <div class="main-content">
        <div class="topbar d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h4 class="mb-1 fw-bold">Stok Yönetimi</h4>
                <small class="text-muted">Depolardaki ürün stoklarını görüntüleyin, ekleyin ve yönetin.</small>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-primary rounded-pill px-4" id="openAddStockModalBtn">
                    <i class="bi bi-plus-circle me-2"></i>Yeni Stok Ekle
                </button>

                <div class="dropdown">
                    <button class="btn btn-light border rounded-pill d-flex align-items-center gap-2" type="button" id="userDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center logged-user-initial" style="width:42px;height:42px;"></div>
                        <span class="fw-semibold logged-user-name"></span>
                        <i class="bi bi-chevron-down small text-muted"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end mt-2" aria-labelledby="userDropdownBtn">
                        <li><button class="dropdown-item d-flex align-items-center gap-2 text-danger" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>Çıkış Yap</button></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card content-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h5 class="section-title mb-0">Stok Listesi</h5>

                    <div class="d-flex gap-2">
                        <input type="text" class="form-control table-search-input" data-table-body-id="stocksTableBody" placeholder="Stok ara..." style="max-width: 220px;">
                        <button class="btn btn-outline-primary rounded-pill table-search-btn" data-table-body-id="stocksTableBody">Ara</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle sortable-table">
                        <thead>
                            <tr>
                                <th data-sortable="true" data-sort-type="string">Depo Adı</th>
                                <th data-sortable="true" data-sort-type="string">Ürün Adı</th>
                                <th data-sortable="true" data-sort-type="number">Stok</th>
                                <th data-sortable="true" data-sort-type="date">Kayıt Tarihi</th>
                                <th class="text-end">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="stocksTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">Stoklar yükleniyor...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addStockModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Yeni Stok Ekle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>

                <div class="modal-body">
                <form id="addStockForm">

                    <div class="row">
                        <!-- Depo -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Depo</label>
                            <select class="form-select" id="warehouseSelect" required>
                                <option value="">Depo seçiniz</option>
                            </select>
                        </div>

                        <!-- Ürün -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ürün</label>
                            <select class="form-select" id="productSelect" required>
                                <option value="">Ürün seçiniz</option>
                            </select>
                        </div>
                    </div>

                    <!-- Stok -->
                    <div class="mb-3">
                        <label class="form-label">Stok Miktarı</label>
                        <input type="number" class="form-control" id="stockAmount" min="0" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary rounded-pill">
                            Stoğu Kaydet
                        </button>
                    </div>

                </form>
            </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editStockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Stok Güncelle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
            </div>

            <div class="modal-body pt-3">
                <form id="editStockForm">
                    <input type="hidden" id="editStockId">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Depo</label>
                            <select class="form-select" id="editWarehouseSelect" required>
                                <option value="">Depo seçiniz</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Ürün</label>
                            <select class="form-select" id="editProductSelect" required>
                                <option value="">Ürün seçiniz</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stok Miktarı</label>
                        <input type="number" class="form-control" id="editStockAmount" min="0" placeholder="Stok miktarını giriniz" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill">
                            Güncelle
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>



    <!-- Confirm Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="confirmModalTitle">Onay</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="mb-0 text-muted" id="confirmModalText"></p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">
                        İptal
                    </button>
                    <button type="button" class="btn btn-danger rounded-pill px-4" id="confirmModalOkBtn">
                        Evet, Sil
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/stocks.js"></script>
</body>
</html>
